<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perrier 予約管理</title>
  <script src="./config.js"></script>

  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      background: #f4f7fb;
      color: #222;
    }

    header {
      background: #1f5f8b;
      color: white;
      padding: 16px;
      text-align: center;
    }

    main {
      max-width: 1100px;
      margin: 20px auto;
      padding: 12px;
    }

    section {
      background: white;
      padding: 16px;
      margin-bottom: 18px;
      border-radius: 10px;
      box-shadow: 0 2px 8px #0001;
    }

    input, button, textarea {
      font-size: 16px;
      padding: 8px;
      margin: 4px;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #1f5f8b;
      color: white;
    }

    button.danger {
      background: #b3261e;
    }

    .hidden {
      display: none;
    }

    .slot-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      border-bottom: 1px solid #eee;
      padding: 8px 0;
    }

    .month-block {
      margin-bottom: 30px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .day {
      background: #eef3f8;
      padding: 8px;
      min-height: 95px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .day:hover {
      outline: 2px solid #1f5f8b;
    }

    .closed {
      background: #ddd;
    }

    .full {
      background: #ffd6d6;
    }

    .available {
      background: #dff5e3;
    }

    .no-slots {
      background: #eee;
    }

    .reservation-mini {
      margin-top: 4px;
      font-size: 11px;
      line-height: 1.35;
      color: #333;
      text-align: left;
      border-top: 1px solid #ccc;
      padding-top: 3px;
    }

    .reservation-mini div {
      margin-bottom: 4px;
    }

    .slot-group {
      border: 2px solid #b8d0e5;
      border-radius: 10px;
      padding: 12px;
      margin: 14px 0;
      background: #f7fbff;
    }

    .slot-group h4 {
      margin: 0 0 10px 0;
      color: #1f5f8b;
    }

    .reservation-card {
      border: 1px solid #bbb;
      background: white;
      padding: 10px;
      border-radius: 8px;
      margin: 8px 0;
    }

    @media (max-width: 700px) {
      .calendar-grid {
        gap: 4px;
      }

      .day {
        min-height: 85px;
        font-size: 11px;
        padding: 5px;
      }

      .reservation-mini {
        font-size: 9px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Perrier 予約管理</h1>
  </header>

  <main>
    <section id="loginSection">
      <h2>管理ログイン</h2>
      <input type="password" id="passwordInput" placeholder="パスワード" />
      <button id="loginButton">ログイン</button>
    </section>

    <div id="adminArea" class="hidden">
      <section>
        <h2>受付期間設定</h2>
        <input type="date" id="startDate" />
        <input type="date" id="endDate" />
        <button id="savePeriodButton">保存</button>
      </section>

      <section>
        <h2>日別時間枠・対応人数設定</h2>
        <p>日付ごとに、時間枠と対応人数を設定できます。</p>
        <input type="date" id="slotDate" />
        <button id="loadSlotsButton">読み込み</button>
        <div id="slotsArea"></div>
        <button id="addSlotButton">時間枠を追加</button>
        <button id="saveSlotsButton">この日の時間枠を保存</button>
      </section>

      <section>
        <h2>休業日設定</h2>
        <input type="date" id="closedDate" />
        <input type="text" id="closedReason" placeholder="理由" />
        <button id="saveClosedButton">休業日にする</button>
      </section>

      <section>
        <h2>キャンセル履歴</h2>
        <div id="cancelHistory"></div>
      </section>

      <section>
        <h2>予約カレンダー</h2>
        <div id="calendar"></div>
      </section>

      <section>
        <h2>選択日の予約</h2>
        <div id="selectedDateInfo"></div>
        <div id="reservationList"></div>
      </section>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      doc,
      getDoc,
      getDocs,
      setDoc,
      updateDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const app = initializeApp(window.firebaseConfig);
    const db = getFirestore(app);

    const loginSection = document.getElementById("loginSection");
    const adminArea = document.getElementById("adminArea");

    const passwordInput = document.getElementById("passwordInput");
    const loginButton = document.getElementById("loginButton");

    const startDate = document.getElementById("startDate");
    const endDate = document.getElementById("endDate");
    const savePeriodButton = document.getElementById("savePeriodButton");

    const slotDate = document.getElementById("slotDate");
    const loadSlotsButton = document.getElementById("loadSlotsButton");
    const slotsArea = document.getElementById("slotsArea");
    const addSlotButton = document.getElementById("addSlotButton");
    const saveSlotsButton = document.getElementById("saveSlotsButton");

    const closedDate = document.getElementById("closedDate");
    const closedReason = document.getElementById("closedReason");
    const saveClosedButton = document.getElementById("saveClosedButton");

    const cancelHistory = document.getElementById("cancelHistory");
    const calendar = document.getElementById("calendar");
    const selectedDateInfo = document.getElementById("selectedDateInfo");
    const reservationList = document.getElementById("reservationList");

    let dailySlotsMap = {};
    let closedDatesMap = {};
    let reservations = [];

    loginButton.addEventListener("click", async () => {
      if (passwordInput.value === "yoshi") {
        loginSection.classList.add("hidden");
        adminArea.classList.remove("hidden");
        await initAdmin();
      } else {
        alert("パスワードが違います。");
      }
    });

    async function initAdmin() {
      await loadPeriod();
      await loadAllData();
      renderCalendar();
      renderCancelHistory();
    }

    async function loadPeriod() {
      const ref = doc(db, "settings", "reservationPeriod");
      const snap = await getDoc(ref);

      if (snap.exists()) {
        const data = snap.data();
        startDate.value = data.startDate || "";
        endDate.value = data.endDate || "";
      }
    }

    savePeriodButton.addEventListener("click", async () => {
      await setDoc(doc(db, "settings", "reservationPeriod"), {
        startDate: startDate.value,
        endDate: endDate.value
      });

      alert("受付期間を保存しました。");
      await loadAllData();
      renderCalendar();
    });

    loadSlotsButton.addEventListener("click", async () => {
      if (!slotDate.value) {
        alert("日付を選択してください。");
        return;
      }

      const ref = doc(db, "dailySlots", slotDate.value);
      const snap = await getDoc(ref);

      slotsArea.innerHTML = "";

      if (snap.exists() && Array.isArray(snap.data().slots)) {
        snap.data().slots.forEach(slot => {
          addSlotRow(slot.time, slot.capacity);
        });
      } else {
        addSlotRow("", 1);
      }
    });

    addSlotButton.addEventListener("click", () => {
      addSlotRow("", 1);
    });

    function addSlotRow(time = "", capacity = 1) {
      const row = document.createElement("div");
      row.className = "slot-row";

      row.innerHTML = `
        <span>時間枠</span>
        <input type="text" class="slot-time" placeholder="例 10:00-10:30" value="${escapeHtml(time)}">
        <span>対応人数</span>
        <input type="number" class="slot-capacity" min="1" value="${Number(capacity || 1)}">
        <button type="button" class="danger remove-slot">削除</button>
      `;

      row.querySelector(".remove-slot").addEventListener("click", () => {
        row.remove();
      });

      slotsArea.appendChild(row);
    }

    saveSlotsButton.addEventListener("click", async () => {
      if (!slotDate.value) {
        alert("日付を選択してください。");
        return;
      }

      const rows = slotsArea.querySelectorAll(".slot-row");
      const slots = [];

      rows.forEach(row => {
        const time = row.querySelector(".slot-time").value.trim();
        const capacity = Number(row.querySelector(".slot-capacity").value);

        if (time && capacity > 0) {
          slots.push({
            time,
            capacity
          });
        }
      });

      await setDoc(doc(db, "dailySlots", slotDate.value), {
        date: slotDate.value,
        slots
      });

      alert("時間枠と対応人数を保存しました。");
      await loadAllData();
      renderCalendar();
    });

    saveClosedButton.addEventListener("click", async () => {
      if (!closedDate.value) {
        alert("日付を選択してください。");
        return;
      }

      await setDoc(doc(db, "closedDates", closedDate.value), {
        date: closedDate.value,
        reason: closedReason.value,
        status: "active"
      });

      alert("休業日を保存しました。");
      closedReason.value = "";
      await loadAllData();
      renderCalendar();
    });

    async function loadAllData() {
      dailySlotsMap = {};
      closedDatesMap = {};
      reservations = [];

      const dailySnap = await getDocs(collection(db, "dailySlots"));
      dailySnap.forEach(docSnap => {
        dailySlotsMap[docSnap.id] = docSnap.data();
      });

      const closedSnap = await getDocs(collection(db, "closedDates"));
      closedSnap.forEach(docSnap => {
        const data = docSnap.data();
        if (data.status === "active") {
          closedDatesMap[docSnap.id] = data;
        }
      });

      const resSnap = await getDocs(collection(db, "reservations"));
      resSnap.forEach(docSnap => {
        reservations.push({
          id: docSnap.id,
          ...docSnap.data()
        });
      });
    }

    function renderCalendar() {
      calendar.innerHTML = "";

      const today = new Date();
      const year = today.getFullYear();
      const month = today.getMonth();

      renderMonth(year, month);
      renderMonth(year, month + 1);
    }

    function renderMonth(year, monthIndex) {
      const first = new Date(year, monthIndex, 1);
      const y = first.getFullYear();
      const m = first.getMonth();
      const last = new Date(y, m + 1, 0);

      const monthBlock = document.createElement("div");
      monthBlock.className = "month-block";

      const title = document.createElement("h3");
      title.textContent = `${y}年${m + 1}月`;
      monthBlock.appendChild(title);

      const grid = document.createElement("div");
      grid.className = "calendar-grid";

      const weekNames = ["日", "月", "火", "水", "木", "金", "土"];
      weekNames.forEach(w => {
        const div = document.createElement("div");
        div.textContent = w;
        div.style.fontWeight = "bold";
        div.style.textAlign = "center";
        grid.appendChild(div);
      });

      for (let i = 0; i < first.getDay(); i++) {
        grid.appendChild(document.createElement("div"));
      }

      for (let d = 1; d <= last.getDate(); d++) {
        const dateStr = formatDate(new Date(y, m, d));

        const div = document.createElement("div");
        div.className = "day";
        div.dataset.date = dateStr;

        const slots = dailySlotsMap[dateStr]?.slots || [];

        const activeReservations = reservations.filter(r =>
          r.date === dateStr && r.status !== "cancelled"
        );

        const totalCapacity = slots.reduce((sum, s) => {
          return sum + Number(s.capacity || 0);
        }, 0);

        const reservedCount = activeReservations.length;
        const remain = totalCapacity - reservedCount;

        let label = `<strong>${d}日</strong>`;

        if (closedDatesMap[dateStr]) {
          div.classList.add("closed");
          label += `<br>休業`;
        } else if (slots.length === 0) {
          div.classList.add("no-slots");
          label += `<br>枠なし`;
        } else if (remain <= 0) {
          div.classList.add("full");
          label += `<br>満席`;
        } else {
          div.classList.add("available");
          label += `<br>空き ${remain}`;
        }

        if (activeReservations.length > 0) {
          label += `<div class="reservation-mini">`;

          activeReservations
            .sort((a, b) => String(a.slot || "").localeCompare(String(b.slot || "")))
            .forEach(r => {
              label += `
                <div>
                  ${escapeHtml(r.slot || "")}<br>
                  ${escapeHtml(r.name || "")}
                </div>
              `;
            });

          label += `</div>`;
        }

        div.innerHTML = label;

        div.addEventListener("click", () => {
          showReservations(dateStr);
        });

        grid.appendChild(div);
      }

      monthBlock.appendChild(grid);
      calendar.appendChild(monthBlock);
    }

    function showReservations(dateStr) {
  const slots = dailySlotsMap[dateStr]?.slots || [];

  const activeReservations = reservations.filter(r =>
    r.date === dateStr && r.status !== "cancelled"
  );

  const cancelledReservations = reservations.filter(r =>
    r.date === dateStr && r.status === "cancelled"
  );

  const totalCapacity = slots.reduce((sum, s) => {
    return sum + Number(s.capacity || 0);
  }, 0);

  selectedDateInfo.innerHTML = `
    <h3>${escapeHtml(dateStr)}</h3>
    <p>全対応人数：${totalCapacity}</p>
    <p>予約済み：${activeReservations.length}</p>
    <p>空き：${Math.max(totalCapacity - activeReservations.length, 0)}</p>
    <p>キャンセル：${cancelledReservations.length}</p>
  `;

  reservationList.innerHTML = "";

  if (slots.length === 0) {
    reservationList.innerHTML = "<p>この日は時間枠が設定されていません。</p>";
    return;
  }

  slots.forEach(slot => {
    const slotReservations = activeReservations.filter(r => r.slot === slot.time);

    const group = document.createElement("div");
    group.className = "slot-group";

    group.innerHTML = `
      <h4>${escapeHtml(slot.time)}　定員 ${slot.capacity}名 / 予約 ${slotReservations.length}名</h4>
    `;

    if (slotReservations.length === 0) {
      const card = document.createElement("div");
      card.className = "reservation-card";
      card.innerHTML = `<div>予約なし</div>`;
      group.appendChild(card);
    }

    slotReservations.forEach(r => {
      const card = document.createElement("div");
      card.className = "reservation-card";

      card.innerHTML = `
        <div><strong>${escapeHtml(r.slot || "")}</strong></div>
        <div>名前：${escapeHtml(r.name || "")}</div>
        <div>電話：${escapeHtml(r.phone || "")}</div>
        <div>メモ：${escapeHtml(r.memo || "")}</div>
        <button class="danger">この予約をキャンセル</button>
      `;

      card.querySelector("button").addEventListener("click", async () => {
        if (!confirm("この予約をキャンセルしますか？")) return;

        await updateDoc(doc(db, "reservations", r.id), {
          status: "cancelled",
          cancelledBy: "admin",
          cancelledAt: serverTimestamp()
        });

        alert("キャンセルしました。");
        await loadAllData();
        renderCalendar();
        showReservations(dateStr);
        renderCancelHistory();
      });

      group.appendChild(card);
    });

    reservationList.appendChild(group);
  });
}

        reservationList.appendChild(group);
      });
    }

    function renderCancelHistory() {
      const cancelled = reservations
        .filter(r => r.status === "cancelled")
        .sort((a, b) => {
          const at = a.cancelledAt?.seconds || 0;
          const bt = b.cancelledAt?.seconds || 0;
          return bt - at;
        })
        .slice(0, 20);

      if (cancelled.length === 0) {
        cancelHistory.innerHTML = "<p>キャンセル履歴はありません。</p>";
        return;
      }

      cancelHistory.innerHTML = "";

      cancelled.forEach(r => {
        const div = document.createElement("div");
        div.className = "reservation-card";

        div.innerHTML = `
          <div>日付：${escapeHtml(r.date || "")}</div>
          <div>時間：${escapeHtml(r.slot || "")}</div>
          <div>名前：${escapeHtml(r.name || "")}</div>
          <div>電話：${escapeHtml(r.phone || "")}</div>
          <div>キャンセル者：${escapeHtml(r.cancelledBy || "")}</div>
        `;

        cancelHistory.appendChild(div);
      });
    }

    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
