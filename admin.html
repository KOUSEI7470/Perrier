<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Perrier 管理画面</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: "Yu Gothic", sans-serif;
  background: linear-gradient(135deg,#10281f,#1f4d3a);
}
.container {
  max-width: 950px;
  margin: 20px auto;
  background: #fffaf0;
  padding: 20px;
  border-radius: 20px;
}
h1, h2, h3 { color: #1f4d3a; }
.card {
  background: white;
  padding: 15px;
  margin-top: 20px;
  border-radius: 15px;
}
input, textarea, button {
  box-sizing: border-box;
  font-size: 16px;
}
input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border: 1px solid #bbb;
  border-radius: 8px;
}
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #1f4d3a;
  color: white;
  border: none;
  border-radius: 10px;
}
.cancel-btn {
  background: #9b2c2c;
}
.months {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}
.calendar {
  background: #fff;
  padding: 10px;
  border-radius: 12px;
}
.week, .days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.week div {
  text-align: center;
  font-weight: bold;
}
.day {
  min-height: 56px;
  padding: 5px;
  border-radius: 8px;
  background: #eef4ef;
  cursor: pointer;
  text-align: center;
}
.day.gray {
  background: #ccc;
  color: #777;
}
.day.hasSlots {
  background: #bfe6c8;
}
.day.full {
  background: #999;
  color: white;
}
.day.closed {
  background: #e88;
  color: white;
}
.day.selected {
  outline: 3px solid #1f4d3a;
}
.small {
  font-size: 12px;
}
.list-item {
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
}
.empty {
  background: #e8f5e9;
}
.reserved {
  background: #ffe1e1;
}
.closed-box {
  background: #ffd6d6;
}
.summary {
  background: #f3f3f3;
}
@media (max-width: 700px) {
  .months {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>
<div class="container">

<div id="loginScreen">
  <h2>管理者ログイン</h2>
  <input type="password" id="adminPass" placeholder="パスワード">
  <button onclick="login()">ログイン</button>
</div>

<div id="adminContent" style="display:none;">

<h1>Perrier 管理画面</h1>

<div class="card">
  <h3>予約受付期間</h3>
  <label>受付開始日</label>
  <input type="date" id="periodStart">
  <label>受付終了日</label>
  <input type="date" id="periodEnd">
  <button onclick="savePeriod()">受付期間を保存</button>
</div>

<div class="card">
  <h3>予約可能日・予約状況カレンダー</h3>
  <p>日付をクリックすると、その日の予約状況を確認できます。</p>
  <div id="calendarArea" class="months"></div>
</div>

<div class="card">
  <h3>選択中の日付</h3>
  <p id="selectedDateText">日付を選択してください</p>

  <h3>この日の予約時間枠</h3>
  <p class="small">1行に1枠ずつ入力してください。例：10:00〜10:30</p>
  <textarea id="slotText" rows="6" placeholder="10:00〜10:30&#10;10:45〜11:15"></textarea>
  <button onclick="saveSlots()">この日の時間枠を保存</button>

  <h3>休業日設定</h3>
  <input type="text" id="closedReason" placeholder="休業理由">
  <button onclick="saveClosedDate()">この日を休業日にする</button>
  <button onclick="deleteClosedDate()">休業日を解除する</button>
</div>

<div class="card">
  <h3>選択日の予約状況</h3>
  <div id="reservationStatusArea">日付を選択してください。</div>
</div>

</div>
</div>

<script src="config.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  updateDoc,
  deleteDoc,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app = initializeApp(window.firebaseConfig);
const db = getFirestore(app);

let selectedDate = "";
let periodStart = "";
let periodEnd = "";
let closedDates = {};
let dailySlots = {};
let reservations = {};

window.login = async function() {
  const pass = document.getElementById("adminPass").value;

  if (pass === "yoshi") {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("adminContent").style.display = "block";
    await loadAll();
  } else {
    alert("パスワードが違います");
  }
};

async function loadAll() {
  await loadPeriod();
  await loadClosedDates();
  await loadDailySlots();
  await loadReservations();
  renderCalendars();

  if (selectedDate) {
    renderReservationStatus(selectedDate);
  }
}

async function loadPeriod() {
  const snap = await getDoc(doc(db, "settings", "reservationPeriod"));
  if (snap.exists()) {
    const data = snap.data();
    periodStart = data.startDate || "";
    periodEnd = data.endDate || "";
    document.getElementById("periodStart").value = periodStart;
    document.getElementById("periodEnd").value = periodEnd;
  }
}

async function loadClosedDates() {
  closedDates = {};
  const snap = await getDocs(collection(db, "closedDates"));
  snap.forEach(d => closedDates[d.id] = d.data());
}

async function loadDailySlots() {
  dailySlots = {};
  const snap = await getDocs(collection(db, "dailySlots"));
  snap.forEach(d => dailySlots[d.id] = d.data());
}

async function loadReservations() {
  reservations = {};
  const snap = await getDocs(collection(db, "reservations"));

  snap.forEach(d => {
    const data = d.data();

    if (data.date && data.status !== "cancelled") {
      if (!reservations[data.date]) {
        reservations[data.date] = [];
      }

      reservations[data.date].push({
        id: d.id,
        ...data
      });
    }
  });
}

window.savePeriod = async function() {
  periodStart = document.getElementById("periodStart").value;
  periodEnd = document.getElementById("periodEnd").value;

  if (!periodStart || !periodEnd) {
    alert("受付開始日と終了日を入力してください");
    return;
  }

  await setDoc(doc(db, "settings", "reservationPeriod"), {
    startDate: periodStart,
    endDate: periodEnd
  });

  alert("受付期間を保存しました");
  await loadAll();
};

window.saveSlots = async function() {
  if (!selectedDate) {
    alert("日付を選択してください");
    return;
  }

  const slots = document.getElementById("slotText").value
    .split("\n")
    .map(s => s.trim())
    .filter(s => s !== "");

  await setDoc(doc(db, "dailySlots", selectedDate), {
    date: selectedDate,
    slots: slots
  });

  alert("時間枠を保存しました");
  await loadAll();
  selectDate(selectedDate);
};

window.saveClosedDate = async function() {
  if (!selectedDate) {
    alert("日付を選択してください");
    return;
  }

  const reason = document.getElementById("closedReason").value || "休業日";

  await setDoc(doc(db, "closedDates", selectedDate), {
    date: selectedDate,
    reason: reason,
    status: "active"
  });

  alert("休業日を登録しました");
  await loadAll();
  selectDate(selectedDate);
};

window.deleteClosedDate = async function() {
  if (!selectedDate) {
    alert("日付を選択してください");
    return;
  }

  await deleteDoc(doc(db, "closedDates", selectedDate));

  alert("休業日を解除しました");
  await loadAll();
  selectDate(selectedDate);
};

window.cancelReservation = async function(reservationId) {
  if (!confirm("この予約をキャンセル扱いにしますか？")) {
    return;
  }

  await updateDoc(doc(db, "reservations", reservationId), {
    status: "cancelled"
  });

  alert("予約をキャンセルしました");

  await loadAll();

  if (selectedDate) {
    selectDate(selectedDate);
  }
};

function renderCalendars() {
  const area = document.getElementById("calendarArea");
  area.innerHTML = "";

  const today = new Date();
  const thisMonth = new Date(today.getFullYear(), today.getMonth(), 1);
  const nextMonth = new Date(today.getFullYear(), today.getMonth() + 1, 1);

  area.appendChild(createMonthCalendar(thisMonth));
  area.appendChild(createMonthCalendar(nextMonth));
}

function createMonthCalendar(baseDate) {
  const year = baseDate.getFullYear();
  const month = baseDate.getMonth();

  const wrap = document.createElement("div");
  wrap.className = "calendar";

  const title = document.createElement("h3");
  title.textContent = `${year}年${month + 1}月`;
  wrap.appendChild(title);

  const week = document.createElement("div");
  week.className = "week";
  ["日", "月", "火", "水", "木", "金", "土"].forEach(w => {
    const div = document.createElement("div");
    div.textContent = w;
    week.appendChild(div);
  });
  wrap.appendChild(week);

  const days = document.createElement("div");
  days.className = "days";

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    days.appendChild(document.createElement("div"));
  }

  for (let d = 1; d <= lastDate; d++) {
    const dateStr = formatDate(year, month + 1, d);
    const div = document.createElement("div");
    div.className = "day";
    div.innerHTML = `<strong>${d}</strong>`;

    const slots = dailySlots[dateStr]?.slots || [];
    const dayReservations = reservations[dateStr] || [];
    const reservedCount = slots.filter(slot =>
      dayReservations.some(r => r.slot === slot)
    ).length;

    const allReserved = slots.length > 0 && reservedCount >= slots.length;

    if (isPast(dateStr) || isOutsidePeriod(dateStr)) {
      div.classList.add("gray");
    }

    if (closedDates[dateStr]) {
      div.classList.add("closed");
      div.innerHTML += `<div class="small">休業</div>`;
    } else if (allReserved) {
      div.classList.add("full");
      div.innerHTML += `<div class="small">満席</div>`;
    } else if (slots.length > 0) {
      div.classList.add("hasSlots");
      div.innerHTML += `<div class="small">空き${slots.length - reservedCount}</div>`;
    } else {
      div.innerHTML += `<div class="small">枠なし</div>`;
    }

    if (dateStr === selectedDate) {
      div.classList.add("selected");
    }

    div.onclick = () => selectDate(dateStr);
    days.appendChild(div);
  }

  wrap.appendChild(days);
  return wrap;
}

function selectDate(dateStr) {
  selectedDate = dateStr;

  document.getElementById("selectedDateText").textContent = dateStr;

  const slots = dailySlots[dateStr]?.slots || [];
  document.getElementById("slotText").value = slots.join("\n");

  const reason = closedDates[dateStr]?.reason || "";
  document.getElementById("closedReason").value = reason;

  renderCalendars();
  renderReservationStatus(dateStr);
}

function renderReservationStatus(dateStr) {
  const area = document.getElementById("reservationStatusArea");
  area.innerHTML = "";

  const slots = dailySlots[dateStr]?.slots || [];
  const dayReservations = reservations[dateStr] || [];

  if (closedDates[dateStr]) {
    const div = document.createElement("div");
    div.className = "list-item closed-box";
    div.innerHTML = `<strong>休業日</strong><br>${closedDates[dateStr].reason || ""}`;
    area.appendChild(div);
  }

  if (slots.length === 0) {
    const div = document.createElement("div");
    div.className = "list-item summary";
    div.textContent = "この日は予約時間枠が登録されていません。";
    area.appendChild(div);
    return;
  }

  const reservedCount = slots.filter(slot =>
    dayReservations.some(r => r.slot === slot)
  ).length;

  const summary = document.createElement("div");
  summary.className = "list-item summary";
  summary.innerHTML = `
    <strong>予約状況</strong><br>
    全${slots.length}枠 / 予約済み${reservedCount}枠 / 空き${slots.length - reservedCount}枠
  `;
  area.appendChild(summary);

  slots.forEach(slot => {
    const found = dayReservations.find(r => r.slot === slot);

    const div = document.createElement("div");
    div.className = "list-item " + (found ? "reserved" : "empty");

    if (found) {
      div.innerHTML = `
        <strong>${slot}：予約あり</strong><br>
        お名前：${found.name || ""}<br>
        電話番号：${found.phone || ""}<br>
        メモ：${found.memo || ""}<br>
        <button class="cancel-btn" onclick="cancelReservation('${found.id}')">この予約をキャンセル</button>
      `;
    } else {
      div.innerHTML = `<strong>${slot}：空き</strong>`;
    }

    area.appendChild(div);
  });
}

function formatDate(year, month, day) {
  return `${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
}

function isPast(dateStr) {
  const today = new Date();
  const todayStr = formatDate(today.getFullYear(), today.getMonth() + 1, today.getDate());
  return dateStr < todayStr;
}

function isOutsidePeriod(dateStr) {
  if (!periodStart || !periodEnd) return false;
  return dateStr < periodStart || dateStr > periodEnd;
}
</script>
</body>
</html>
