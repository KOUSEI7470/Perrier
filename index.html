<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perrier 予約フォーム</title>
  <script src="./config.js"></script>
  
 <style>
  body {
    font-family: "Yu Gothic", "Hiragino Sans", system-ui, sans-serif;
    margin: 0;
    background:
      radial-gradient(circle at top left, #fff7d6 0, transparent 28%),
      linear-gradient(135deg, #071b33 0%, #123b63 45%, #f4efe3 100%);
    color: #1f2430;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #08182d, #174b78);
    color: #fff;
    padding: 26px 16px;
    text-align: center;
    border-bottom: 4px solid #c9a646;
    box-shadow: 0 6px 18px #0004;
  }

  header h1 {
    margin: 0;
    font-size: 30px;
    letter-spacing: 0.08em;
    text-shadow: 0 2px 6px #0006;
  }

  main {
    max-width: 980px;
    margin: 24px auto;
    padding: 14px;
  }

  section {
    background: rgba(255, 255, 255, 0.94);
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 18px;
    box-shadow: 0 10px 28px #0002;
    border: 1px solid rgba(201, 166, 70, 0.45);
    backdrop-filter: blur(4px);
  }

  h2 {
    margin-top: 0;
    color: #123b63;
    border-left: 6px solid #c9a646;
    padding-left: 10px;
  }

  label {
    font-weight: 700;
    color: #123b63;
  }

  input, textarea, button {
    font-size: 16px;
    padding: 11px;
    margin: 6px 0 12px;
    box-sizing: border-box;
  }

  input, textarea {
    width: 100%;
    border: 1px solid #c8d2df;
    border-radius: 10px;
    background: #fff;
    box-shadow: inset 0 1px 3px #0001;
  }

  input:focus, textarea:focus {
    outline: none;
    border-color: #c9a646;
    box-shadow: 0 0 0 3px rgba(201, 166, 70, 0.22);
  }

  button {
    cursor: pointer;
    border: none;
    border-radius: 999px;
    background: linear-gradient(135deg, #123b63, #1f6fa8);
    color: white;
    font-weight: 700;
    box-shadow: 0 5px 12px #0002;
  }

  button:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 16px #0003;
  }

  button:disabled {
    background: #aaa;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  .danger {
    background: linear-gradient(135deg, #8f1d18, #c83a31);
  }

  .hidden {
    display: none;
  }

  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }

  .day {
    background: linear-gradient(180deg, #f7fbff, #e8f1fa);
    padding: 10px 6px;
    min-height: 78px;
    border-radius: 14px;
    cursor: pointer;
    font-size: 14px;
    text-align: center;
    border: 1px solid #d4dfeb;
    box-shadow: 0 3px 8px #0001;
    transition: 0.18s;
  }

  .day:hover {
    outline: 2px solid #c9a646;
    transform: translateY(-2px);
  }

  .disabled-day {
    background: #d9d9d9;
    color: #888;
    cursor: not-allowed;
    box-shadow: none;
  }

  .closed {
    background: #d8d8d8;
    color: #777;
    cursor: not-allowed;
  }

  .full {
    background: linear-gradient(180deg, #ffe1e1, #ffc4c4);
    color: #8a2a2a;
    cursor: not-allowed;
    border-color: #e3aaaa;
  }

  .available {
    background: linear-gradient(180deg, #fff9e8, #dff5e3);
    color: #165b2f;
    border: 2px solid #c9a646;
    font-weight: 800;
  }

  .no-slots {
    background: #ececec;
    color: #888;
    cursor: not-allowed;
  }

  .slot-button {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 14px;
    background: linear-gradient(135deg, #f7fbff, #e8f1fa);
    color: #123b63;
    text-align: left;
    border: 1px solid #b8d0e5;
    border-radius: 14px;
    font-weight: 700;
  }

  .slot-button.selected {
    background: linear-gradient(135deg, #123b63, #1f6fa8);
    color: white;
    border-color: #c9a646;
  }

  .slot-button:disabled {
    background: #ddd;
    color: #888;
  }

  .my-reservation {
    border: 1px solid #c9a646;
    background: linear-gradient(180deg, #fffdf5, #f0f7ff);
    padding: 14px;
    border-radius: 14px;
    box-shadow: 0 4px 12px #0001;
  }

  @media (max-width: 700px) {
    main {
      margin: 12px auto;
      padding: 8px;
    }

    section {
      padding: 14px;
      border-radius: 14px;
    }

    header h1 {
      font-size: 24px;
    }

    .calendar {
      gap: 5px;
    }

    .day {
      min-height: 64px;
      font-size: 12px;
      padding: 7px 3px;
      border-radius: 10px;
    }
  }
</style> 
</head>
<body>
  <header>
    <h1>Perrier 予約フォーム</h1>
  </header>

  <main>
    <section id="myReservationSection" class="hidden">
      <h2>あなたの予約</h2>
      <div id="myReservationBox"></div>
    </section>

    <section>
      <h2>予約日を選択</h2>
      <div id="calendar" class="calendar"></div>
    </section>

    <section id="slotSection" class="hidden">
      <h2>時間枠を選択</h2>
      <div id="selectedDateTitle"></div>
      <div id="slotList"></div>
    </section>

    <section id="formSection" class="hidden">
      <h2>予約内容入力</h2>
      <p id="selectedInfo"></p>

      <label>お名前</label>
      <input type="text" id="nameInput" />

      <label>電話番号</label>
      <input type="tel" id="phoneInput" />

      <label>メモ</label>
      <textarea id="memoInput" rows="4"></textarea>

      <button id="reserveButton">予約する</button>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      doc,
      getDoc,
      getDocs,
      addDoc,
      updateDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const app = initializeApp(window.firebaseConfig);
    const db = getFirestore(app);

    const calendar = document.getElementById("calendar");

    const myReservationSection = document.getElementById("myReservationSection");
    const myReservationBox = document.getElementById("myReservationBox");

    const slotSection = document.getElementById("slotSection");
    const selectedDateTitle = document.getElementById("selectedDateTitle");
    const slotList = document.getElementById("slotList");

    const formSection = document.getElementById("formSection");
    const selectedInfo = document.getElementById("selectedInfo");

    const nameInput = document.getElementById("nameInput");
    const phoneInput = document.getElementById("phoneInput");
    const memoInput = document.getElementById("memoInput");
    const reserveButton = document.getElementById("reserveButton");

    let reservationPeriod = null;
    let dailySlotsMap = {};
    let closedDatesMap = {};
    let reservations = [];

    let selectedDate = "";
    let selectedSlot = "";

    init();

    async function init() {
      await loadAllData();
      renderMyReservation();
      renderCalendar();
    }

    async function loadAllData() {
      dailySlotsMap = {};
      closedDatesMap = {};
      reservations = [];

      const periodSnap = await getDoc(doc(db, "settings", "reservationPeriod"));
      if (periodSnap.exists()) {
        reservationPeriod = periodSnap.data();
      }

      const dailySnap = await getDocs(collection(db, "dailySlots"));
      dailySnap.forEach(docSnap => {
        dailySlotsMap[docSnap.id] = docSnap.data();
      });

      const closedSnap = await getDocs(collection(db, "closedDates"));
      closedSnap.forEach(docSnap => {
        const data = docSnap.data();
        if (data.status === "active") {
          closedDatesMap[docSnap.id] = data;
        }
      });

      const resSnap = await getDocs(collection(db, "reservations"));
      resSnap.forEach(docSnap => {
        reservations.push({
          id: docSnap.id,
          ...docSnap.data()
        });
      });
    }

    function renderMyReservation() {
      const savedText = localStorage.getItem("perrierMyReservation");

      if (!savedText) {
        myReservationSection.classList.add("hidden");
        return;
      }

      const saved = JSON.parse(savedText);
      const latest = reservations.find(r => r.id === saved.reservationId);

      myReservationSection.classList.remove("hidden");

      if (!latest) {
        myReservationBox.innerHTML = `
          <div class="my-reservation">
            <p>予約情報が見つかりません。</p>
          </div>
        `;
        return;
      }

      if (latest.status === "cancelled") {
        myReservationBox.innerHTML = `
          <div class="my-reservation">
            <p><strong>この予約はキャンセルされました。</strong></p>
            <p>日付：${escapeHtml(latest.date || "")}</p>
            <p>時間：${escapeHtml(latest.slot || "")}</p>
          </div>
        `;
        return;
      }

      myReservationBox.innerHTML = `
        <div class="my-reservation">
          <p>日付：${escapeHtml(latest.date || "")}</p>
          <p>時間：${escapeHtml(latest.slot || "")}</p>
          <p>名前：${escapeHtml(latest.name || "")}</p>
          <p>電話：${escapeHtml(latest.phone || "")}</p>
          <p>メモ：${escapeHtml(latest.memo || "")}</p>
          <button id="cancelMyReservationButton" class="danger">この予約をキャンセル</button>
        </div>
      `;

      document.getElementById("cancelMyReservationButton").addEventListener("click", async () => {
        if (!confirm("この予約をキャンセルしますか？")) return;

        await updateDoc(doc(db, "reservations", latest.id), {
          status: "cancelled",
          cancelledBy: "customer",
          cancelledAt: serverTimestamp()
        });

        alert("予約をキャンセルしました。");
        await loadAllData();
        renderMyReservation();
        renderCalendar();
        clearSelection();
      });
    }

    function renderCalendar() {
      calendar.innerHTML = "";

      const today = new Date();
      const year = today.getFullYear();
      const month = today.getMonth();

      renderMonth(year, month);
      renderMonth(year, month + 1);
    }

    function renderMonth(year, monthIndex) {
      const first = new Date(year, monthIndex, 1);
      const y = first.getFullYear();
      const m = first.getMonth();
      const last = new Date(y, m + 1, 0);

      const title = document.createElement("h3");
      title.textContent = `${y}年${m + 1}月`;
      title.style.gridColumn = "1 / -1";
      calendar.appendChild(title);

      const weekNames = ["日", "月", "火", "水", "木", "金", "土"];
      weekNames.forEach(w => {
        const div = document.createElement("div");
        div.textContent = w;
        div.style.fontWeight = "bold";
        div.style.textAlign = "center";
        calendar.appendChild(div);
      });

      for (let i = 0; i < first.getDay(); i++) {
        calendar.appendChild(document.createElement("div"));
      }

      for (let d = 1; d <= last.getDate(); d++) {
        const date = new Date(y, m, d);
        const dateStr = formatDate(date);
        const div = document.createElement("div");
        div.className = "day";

        const state = getDateState(dateStr);
        div.innerHTML = `${d}日<br>${state.label}`;

        div.classList.add(state.className);

        if (state.canSelect) {
          div.addEventListener("click", () => {
            selectDate(dateStr);
          });
        }

        calendar.appendChild(div);
      }
    }

    function getDateState(dateStr) {
      const todayStr = formatDate(new Date());

      if (dateStr < todayStr) {
        return {
          label: "",
          className: "disabled-day",
          canSelect: false
        };
      }

      if (reservationPeriod) {
        if (reservationPeriod.startDate && dateStr < reservationPeriod.startDate) {
          return {
            label: "受付前",
            className: "disabled-day",
            canSelect: false
          };
        }

        if (reservationPeriod.endDate && dateStr > reservationPeriod.endDate) {
          return {
            label: "受付外",
            className: "disabled-day",
            canSelect: false
          };
        }
      }

      if (closedDatesMap[dateStr]) {
        return {
          label: "休業",
          className: "closed",
          canSelect: false
        };
      }

      const slots = dailySlotsMap[dateStr]?.slots || [];

      if (slots.length === 0) {
        return {
          label: "枠なし",
          className: "no-slots",
          canSelect: false
        };
      }

      const totalCapacity = slots.reduce((sum, slot) => {
        return sum + Number(slot.capacity || 0);
      }, 0);

      const activeCount = reservations.filter(r => {
        return r.date === dateStr && r.status !== "cancelled";
      }).length;

      const remain = totalCapacity - activeCount;

      if (remain <= 0) {
        return {
          label: "満席",
          className: "full",
          canSelect: false
        };
      }

      return {
        label: "〇",
        className: "available",
        canSelect: true
      };
    }

    function selectDate(dateStr) {
      selectedDate = dateStr;
      selectedSlot = "";

      selectedDateTitle.innerHTML = `<p><strong>${dateStr}</strong></p>`;
      slotList.innerHTML = "";

      const slots = dailySlotsMap[dateStr]?.slots || [];

      slots.forEach(slot => {
        const activeCount = reservations.filter(r => {
          return r.date === dateStr &&
                 r.slot === slot.time &&
                 r.status !== "cancelled";
        }).length;

        const capacity = Number(slot.capacity || 0);
        const remain = capacity - activeCount;

        const button = document.createElement("button");
        button.className = "slot-button";

        if (remain <= 0) {
          button.textContent = `${slot.time}　満席`;
          button.disabled = true;
        } else {
          button.textContent = `${slot.time}　残り ${remain}名`;
          button.addEventListener("click", () => {
            selectedSlot = slot.time;
            document.querySelectorAll(".slot-button").forEach(btn => {
              btn.classList.remove("selected");
            });
            button.classList.add("selected");
            showForm();
          });
        }

        slotList.appendChild(button);
      });

      slotSection.classList.remove("hidden");
      formSection.classList.add("hidden");
    }

    function showForm() {
      selectedInfo.textContent = `予約日：${selectedDate}　時間：${selectedSlot}`;
      formSection.classList.remove("hidden");
    }

    reserveButton.addEventListener("click", async () => {
      if (!selectedDate || !selectedSlot) {
        alert("日付と時間枠を選択してください。");
        return;
      }

      const name = nameInput.value.trim();
      const phone = phoneInput.value.trim();
      const memo = memoInput.value.trim();

      if (!name || !phone) {
        alert("お名前と電話番号を入力してください。");
        return;
      }

      const slotInfo = (dailySlotsMap[selectedDate]?.slots || []).find(s => s.time === selectedSlot);

      if (!slotInfo) {
        alert("選択した時間枠が見つかりません。");
        await loadAllData();
        renderCalendar();
        clearSelection();
        return;
      }

      const activeCount = reservations.filter(r => {
        return r.date === selectedDate &&
               r.slot === selectedSlot &&
               r.status !== "cancelled";
      }).length;

      const remain = Number(slotInfo.capacity || 0) - activeCount;

      if (remain <= 0) {
        alert("この時間枠は満席になりました。別の時間を選択してください。");
        await loadAllData();
        renderCalendar();
        selectDate(selectedDate);
        return;
      }

      reserveButton.disabled = true;

      try {
        const docRef = await addDoc(collection(db, "reservations"), {
          date: selectedDate,
          slot: selectedSlot,
          name,
          phone,
          memo,
          status: "active",
          createdAt: serverTimestamp(),
          cancelledAt: null,
          cancelledBy: ""
        });

        localStorage.setItem("perrierMyReservation", JSON.stringify({
          reservationId: docRef.id,
          date: selectedDate,
          slot: selectedSlot,
          name,
          phone,
          memo
        }));

        alert("予約を受け付けました。");

        nameInput.value = "";
        phoneInput.value = "";
        memoInput.value = "";

        await loadAllData();
        renderMyReservation();
        renderCalendar();
        clearSelection();

      } catch (error) {
        console.error(error);
        alert("予約の保存に失敗しました。");
      } finally {
        reserveButton.disabled = false;
      }
    });

    function clearSelection() {
      selectedDate = "";
      selectedSlot = "";
      slotSection.classList.add("hidden");
      formSection.classList.add("hidden");
      slotList.innerHTML = "";
      selectedInfo.textContent = "";
    }

    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
